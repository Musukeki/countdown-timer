<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tech Countdown Timer</title>

    <style>
      /* ================================
         Basic Settings
      ================================= */

      * {
        box-sizing: border-box;
      }

      :root {
        --bg-color: #050a12;
        --panel-color: rgba(10, 20, 35, 0.85);
        --border-color: rgba(0, 174, 255, 0.35);
        --primary-color: #00b7ff;
        --primary-light: #69dcff;
        --success-color: #00ff9d;
        --warning-color: #ffc400;
        --danger-color: #ff3864;
        --text-color: #e8f7ff;
        --sub-text-color: #6e91a8;
      }

      /* ================================
         Body
      ================================= */

      body {
        margin: 0;

        width: 100vw;
        min-height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;

        font-family: "Segoe UI", Arial, sans-serif;

        color: var(--text-color);

        background:
          radial-gradient(
            circle at 50% 50%,
            rgba(0, 140, 255, 0.08),
            transparent 40%
          ),
          #050a12;

        overflow: hidden;

        position: relative;
      }

      /* ================================
         Tech Background Grid
      ================================= */

      body::before {
        content: "";

        position: fixed;

        inset: 0;

        background-image:
          linear-gradient(rgba(0, 174, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 174, 255, 0.04) 1px, transparent 1px);

        background-size: 40px 40px;

        mask-image: linear-gradient(
          to bottom,
          transparent,
          black 20%,
          black 80%,
          transparent
        );

        pointer-events: none;
      }

      /* ================================
         Background Glow
      ================================= */

      body::after {
        content: "";

        position: fixed;

        width: 600px;
        height: 600px;

        background: rgba(0, 140, 255, 0.06);

        filter: blur(100px);

        pointer-events: none;
      }

      /* ================================
         Main Container
      ================================= */

      .timer-container {
        position: relative;

        width: min(90%, 620px);

        padding: 45px;

        text-align: center;

        background: linear-gradient(
          145deg,
          rgba(12, 28, 48, 0.95),
          rgba(4, 12, 22, 0.95)
        );

        border: 1px solid var(--border-color);

        box-shadow:
          0 0 0 1px rgba(0, 174, 255, 0.05),
          0 0 30px rgba(0, 140, 255, 0.12),
          inset 0 0 30px rgba(0, 140, 255, 0.04);

        overflow: hidden;

        transition:
          width 0.25s ease,
          padding 0.25s ease;
      }

      /* ================================
         Top Decoration
      ================================= */

      .timer-container::before {
        content: "";

        position: absolute;

        top: 0;
        left: 10%;
        right: 10%;

        height: 1px;

        background: linear-gradient(
          90deg,
          transparent,
          var(--primary-color),
          transparent
        );

        box-shadow: 0 0 10px var(--primary-color);
      }

      /* ================================
         System Label
      ================================= */

      .system-label {
        margin-bottom: 10px;

        font-size: 12px;

        letter-spacing: 4px;

        color: var(--primary-color);

        text-shadow: 0 0 8px rgba(0, 183, 255, 0.8);
      }

      h1 {
        margin: 0 0 35px;

        font-size: 32px;

        font-weight: 600;

        letter-spacing: 3px;

        color: #ffffff;

        text-shadow: 0 0 10px rgba(0, 183, 255, 0.4);
      }

      /* ================================
         Input Section
      ================================= */

      .input-group {
        display: flex;

        gap: 10px;

        margin-bottom: 45px;
      }

      #timeInput {
        flex: 1;

        min-width: 0;

        padding: 15px 20px;

        font-size: 18px;

        letter-spacing: 2px;

        text-align: center;

        color: var(--text-color);

        background: rgba(0, 0, 0, 0.35);

        border: 1px solid rgba(0, 183, 255, 0.3);

        outline: none;
      }

      #timeInput::placeholder {
        color: #486579;
      }

      #timeInput:focus {
        border-color: var(--primary-color);

        box-shadow:
          0 0 10px rgba(0, 183, 255, 0.25),
          inset 0 0 10px rgba(0, 183, 255, 0.05);
      }

      /* ================================
         Convert Button
      ================================= */

      .convert-btn {
        padding: 0 24px;

        border: 1px solid rgba(0, 183, 255, 0.5);

        background: rgba(0, 183, 255, 0.08);

        color: var(--primary-light);

        font-size: 15px;

        letter-spacing: 1px;

        cursor: pointer;
      }

      .convert-btn:hover {
        background: rgba(0, 183, 255, 0.2);

        border-color: var(--primary-color);

        box-shadow: 0 0 15px rgba(0, 183, 255, 0.35);

        color: #ffffff;
      }

      /* ================================
         Timer
      ================================= */

      .timer {
        position: relative;

        padding: 35px 20px;

        margin-bottom: 35px;

        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.2),
          rgba(0, 183, 255, 0.03)
        );

        border-top: 1px solid rgba(0, 183, 255, 0.12);

        border-bottom: 1px solid rgba(0, 183, 255, 0.12);
      }

      /* ================================
         Seconds Display
      ================================= */

      #secondsDisplay {
        font-family: "Courier New", monospace;

        font-size: clamp(60px, 12vw, 100px);

        font-weight: bold;

        line-height: 1;

        letter-spacing: 8px;

        color: var(--primary-light);

        text-shadow:
          0 0 5px rgba(0, 183, 255, 0.8),
          0 0 20px rgba(0, 183, 255, 0.5),
          0 0 40px rgba(0, 183, 255, 0.25);

        word-break: break-all;
      }

      .unit {
        margin-top: 18px;

        font-size: 13px;

        letter-spacing: 5px;

        color: var(--sub-text-color);
      }

      /* ================================
         Control Buttons
      ================================= */

      .buttons {
        display: flex;

        justify-content: center;

        gap: 12px;
      }

      .buttons button {
        min-width: 110px;

        padding: 13px 20px;

        border: 1px solid transparent;

        font-size: 15px;

        letter-spacing: 1px;

        cursor: pointer;

        transition:
          transform 0.2s ease,
          box-shadow 0.3s ease,
          background 0.3s ease;
      }

      .buttons button:hover {
        transform: translateY(-2px);
      }

      /* ================================
         Start
      ================================= */

      #startBtn {
        background: rgba(0, 255, 157, 0.08);

        border-color: rgba(0, 255, 157, 0.5);

        color: var(--success-color);
      }

      /* ================================
         Pause
      ================================= */

      #pauseBtn {
        background: rgba(255, 196, 0, 0.08);

        border-color: rgba(255, 196, 0, 0.5);

        color: var(--warning-color);
      }

      /* ================================
         Reset
      ================================= */

      #resetBtn {
        background: rgba(255, 56, 100, 0.08);

        border-color: rgba(255, 56, 100, 0.5);

        color: var(--danger-color);
      }

      /* ================================
         Message
      ================================= */

      #message {
        height: 24px;

        margin-top: 25px;

        font-size: 13px;

        letter-spacing: 1px;

        color: var(--sub-text-color);
      }

      /* ================================
         Scan Line
      ================================= */

      .scan-line {
        position: absolute;

        left: 0;
        right: 0;

        height: 1px;

        background: rgba(0, 183, 255, 0.08);

        animation: scan 5s linear infinite;

        pointer-events: none;
      }

      @keyframes scan {
        0% {
          top: 0;
          opacity: 0;
        }

        10% {
          opacity: 1;
        }

        90% {
          opacity: 1;
        }

        100% {
          top: 100%;
          opacity: 0;
        }
      }

      /* ==================================================
         MINI MODE
         
         當桌面 App 視窗寬度小於 420px
         
         隱藏：
         - SYSTEM // COUNTDOWN
         - Countdown Timer 標題
         - 時間輸入
         - Convert
         - SECONDS
         - Message
      ================================================== */

      @media (max-width: 420px) {
        body {
          min-height: 100vh;

          align-items: center;

          background: #050a12;
        }

        .timer-container {
          width: 100%;
          max-width: none;

          padding: 12px;

          border: 1px solid rgba(0, 183, 255, 0.35);

          box-shadow: 0 0 20px rgba(0, 140, 255, 0.15);
        }

        /* 隱藏完整模式 UI */

        .system-label,
        h1,
        .input-group,
        .unit,
        #message,
        .scan-line {
          display: none;
        }

        /* Timer 變成主要顯示區 */

        .timer {
          margin: 0 0 12px;

          padding: 12px 5px;

          border: none;

          background: transparent;
        }

        #secondsDisplay {
          font-size: clamp(42px, 15vw, 70px);

          letter-spacing: 3px;

          white-space: nowrap;

          word-break: normal;
        }

        /* 按鈕變小 */

        .buttons {
          width: 100%;

          gap: 6px;
        }

        .buttons button {
          flex: 1;

          min-width: 0;

          padding: 9px 5px;

          font-size: 12px;

          letter-spacing: 0;
        }
      }

      /* ==================================================
         EXTRA MINI MODE
         
         視窗非常小時
         例如：
         280 x 120
      ================================================== */

      @media (max-width: 320px) {
        .timer-container {
          padding: 8px;
        }

        .timer {
          padding: 5px 0;

          margin-bottom: 7px;
        }

        #secondsDisplay {
          font-size: 38px;

          letter-spacing: 1px;
        }

        .buttons {
          gap: 4px;
        }

        .buttons button {
          padding: 7px 3px;

          font-size: 10px;
        }
      }

      /* ==================================================
         MOBILE
      ================================================== */

      @media (max-width: 600px) {
        .timer-container {
          padding: 30px 20px;
        }

        h1 {
          font-size: 25px;
        }

        .input-group {
          flex-direction: column;
        }

        .convert-btn {
          padding: 13px;
        }

        .buttons {
          flex-wrap: wrap;
        }

        .buttons button {
          flex: 1;

          min-width: 90px;
        }

        #secondsDisplay {
          font-size: 58px;

          letter-spacing: 4px;
        }
      }

      /* ==================================================
         Important
         
         MINI MODE 必須放在 MOBILE 後面
         
         重新覆蓋 max-width: 420px 的設定
      ================================================== */

      @media (max-width: 420px) {
        .timer-container {
          width: 100%;

          padding: 12px;
        }

        .system-label,
        h1,
        .input-group,
        .unit,
        #message,
        .scan-line {
          display: none;
        }

        .timer {
          padding: 12px 5px;

          margin-bottom: 12px;

          border: none;
        }

        #secondsDisplay {
          font-size: clamp(42px, 15vw, 70px);

          letter-spacing: 3px;
        }

        .buttons {
          display: flex;

          flex-wrap: nowrap;

          gap: 6px;
        }

        .buttons button {
          flex: 1;

          min-width: 0;

          padding: 9px 5px;

          font-size: 10px;
        }
      }
    </style>
  </head>

  <body>
    <div class="timer-container">
      <div class="scan-line"></div>

      <div class="system-label">SYSTEM // COUNTDOWN</div>

      <h1>Countdown Timer</h1>

      <!-- Input -->

      <div class="input-group">
        <input id="timeInput" type="text" placeholder="Ex: 1:50" />

        <button class="convert-btn" onclick="convertTime()">Convert</button>
      </div>

      <!-- Timer -->

      <div class="timer">
        <div id="secondsDisplay">0</div>

        <div class="unit">SECONDS</div>
      </div>

      <!-- Buttons -->

      <div class="buttons">
        <button id="startBtn" onclick="startTimer()">START</button>

        <button id="pauseBtn" onclick="pauseTimer()">PAUSE</button>

        <button id="resetBtn" onclick="resetTimer()">RESET</button>
      </div>

      <div id="message"></div>
    </div>

    <script>
      let totalSeconds = 0;

      let remainingSeconds = 0;

      let timer = null;

      const secondsDisplay = document.getElementById("secondsDisplay");

      const timeInput = document.getElementById("timeInput");

      const message = document.getElementById("message");

      /* ================================
         Convert Time
      ================================= */

      function convertTime() {
        const input = timeInput.value.trim();

        if (!input) {
          message.textContent = "Please enter a time";

          return;
        }

        let seconds = 0;

        /* Numbers only */

        if (/^\d+$/.test(input)) {
          const minutes = parseInt(input, 10);

          seconds = minutes * 60;
        } else {
          /* Hours : Minutes */
          const parts = input.split(":").map(Number);

          if (parts.length !== 2 || parts.some(isNaN)) {
            message.textContent = "Invalid format, please enter HH:mm";

            return;
          }

          const hours = parts[0];

          const minutes = parts[1];

          if (minutes >= 60) {
            message.textContent = "Minutes must be less than 60";

            return;
          }

          const totalMinutes = hours * 60 + minutes;

          seconds = totalMinutes * 60;

          totalSeconds = seconds;

          remainingSeconds = seconds;

          updateDisplay();

          message.textContent = `${hours} hours ${minutes} minutes = ${totalMinutes} minutes × 60 = ${seconds} seconds`;

          return;
        }

        totalSeconds = seconds;

        remainingSeconds = seconds;

        updateDisplay();

        const totalMinutes = seconds / 60;

        message.textContent = `${totalMinutes} minutes × 60 = ${seconds} seconds`;
      }

      /* ================================
         Start Countdown
      ================================= */

      function startTimer() {
        if (timer !== null) {
          return;
        }

        if (remainingSeconds <= 0) {
          message.textContent = "Please enter a time first";

          return;
        }

        message.textContent = "COUNTDOWN ACTIVE";

        timer = setInterval(() => {
          remainingSeconds--;

          updateDisplay();

          if (remainingSeconds <= 0) {
            clearInterval(timer);

            timer = null;

            remainingSeconds = 0;

            message.textContent = "TIME COMPLETED";
          }
        }, 1000);
      }

      /* ================================
         Pause
      ================================= */

      function pauseTimer() {
        if (timer !== null) {
          clearInterval(timer);

          timer = null;

          message.textContent = "COUNTDOWN PAUSED";
        }
      }

      /* ================================
         Reset
      ================================= */

      function resetTimer() {
        clearInterval(timer);

        timer = null;

        remainingSeconds = totalSeconds;

        updateDisplay();

        message.textContent = "SYSTEM RESET";
      }

      /* ================================
         Update Display
      ================================= */

      function updateDisplay() {
        secondsDisplay.textContent = remainingSeconds;
      }

      /* ================================
         Enter to Convert
      ================================= */

      timeInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          convertTime();
        }
      });
    </script>
  </body>
</html>
