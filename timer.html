<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tech Countdown Timer</title>

    <style>
      /* ================================
     Basic Settings
  ================================= */

      * {
        box-sizing: border-box;
      }

      :root {
        --bg-color: #050a12;
        --panel-color: rgba(10, 20, 35, 0.85);
        --border-color: rgba(0, 174, 255, 0.35);

        /* Main Theme */
        --primary-color: #00b7ff;
        --primary-light: #69dcff;

        /* Button Hover Colors */
        --success-color: #00ff9d;
        --warning-color: #ffc400;
        --danger-color: #ff3864;

        --text-color: #e8f7ff;
        --sub-text-color: #6e91a8;
      }

      /* ================================
     Body
  ================================= */

      body {
        margin: 0;

        width: 100vw;
        min-height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;

        font-family: "Segoe UI", Arial, sans-serif;

        color: var(--text-color);

        background:
          radial-gradient(
            circle at 50% 50%,
            rgba(0, 140, 255, 0.08),
            transparent 40%
          ),
          #050a12;

        overflow: hidden;

        position: relative;
      }

      /* ================================
     Tech Background Grid
  ================================= */

      body::before {
        content: "";

        position: fixed;

        inset: 0;

        background-image:
          linear-gradient(rgba(0, 174, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 174, 255, 0.04) 1px, transparent 1px);

        background-size: 40px 40px;

        mask-image: linear-gradient(
          to bottom,
          transparent,
          black 20%,
          black 80%,
          transparent
        );

        pointer-events: none;
      }

      /* ================================
     Background Glow
  ================================= */

      body::after {
        content: "";

        position: fixed;

        width: 600px;
        height: 600px;

        background: rgba(0, 140, 255, 0.06);

        filter: blur(100px);

        pointer-events: none;
      }

      /* ================================
     Main Container
  ================================= */

      .timer-container {
        position: relative;

        width: min(90%, 620px);

        padding: 45px;

        text-align: center;

        background: linear-gradient(
          145deg,
          rgba(12, 28, 48, 0.95),
          rgba(4, 12, 22, 0.95)
        );

        border: 1px solid var(--border-color);

        box-shadow:
          0 0 0 1px rgba(0, 174, 255, 0.05),
          0 0 30px rgba(0, 140, 255, 0.12),
          inset 0 0 30px rgba(0, 140, 255, 0.04);

        overflow: hidden;

        transition:
          width 0.25s ease,
          padding 0.25s ease;
      }

      /* ================================
     Top Decoration
  ================================= */

      .timer-container::before {
        content: "";

        position: absolute;

        top: 0;
        left: 10%;
        right: 10%;

        height: 1px;

        background: linear-gradient(
          90deg,
          transparent,
          var(--primary-color),
          transparent
        );

        box-shadow: 0 0 10px var(--primary-color);
      }

      /* ================================
     System Label
  ================================= */

      .system-label {
        margin-bottom: 10px;

        font-size: 12px;

        letter-spacing: 4px;

        color: var(--primary-color);

        text-shadow: 0 0 8px rgba(0, 183, 255, 0.8);
      }

      h1 {
        margin: 0 0 35px;

        font-size: 32px;

        font-weight: 600;

        letter-spacing: 3px;

        color: #ffffff;

        text-shadow: 0 0 10px rgba(0, 183, 255, 0.4);
      }

      /* ================================
     Input Section
  ================================= */

      .input-group {
        display: flex;

        gap: 10px;

        margin-bottom: 45px;
      }

      #timeInput {
        flex: 1;

        min-width: 0;

        padding: 15px 20px;

        font-size: 18px;

        letter-spacing: 3px;

        text-align: center;

        color: var(--text-color);

        background: rgba(0, 0, 0, 0.35);

        border: 1px solid rgba(0, 183, 255, 0.3);

        outline: none;
      }

      #timeInput::placeholder {
        color: #486579;
      }

      #timeInput:focus {
        border-color: var(--primary-color);

        box-shadow:
          0 0 10px rgba(0, 183, 255, 0.25),
          inset 0 0 10px rgba(0, 183, 255, 0.05);
      }

      /* ================================
     Timer
  ================================= */

      .timer {
        position: relative;

        padding: 35px 20px 25px;

        margin-bottom: 35px;

        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.2),
          rgba(0, 183, 255, 0.03)
        );

        border-top: 1px solid rgba(0, 183, 255, 0.12);

        border-bottom: 1px solid rgba(0, 183, 255, 0.12);
      }

      /* ================================
     Seconds Display
  ================================= */

      #secondsDisplay {
        font-family: "Courier New", monospace;

        font-size: clamp(60px, 12vw, 100px);

        font-weight: bold;

        line-height: 1;

        letter-spacing: 8px;

        color: var(--primary-light);

        text-shadow:
          0 0 5px rgba(0, 183, 255, 0.8),
          0 0 20px rgba(0, 183, 255, 0.5),
          0 0 40px rgba(0, 183, 255, 0.25);

        word-break: break-all;
      }

      .unit {
        margin-top: 18px;

        font-size: 13px;

        letter-spacing: 5px;

        color: var(--sub-text-color);
      }

      /* ================================
     Progress Bar
  ================================= */

      .progress-container {
        width: 100%;

        height: 8px;

        margin-top: 25px;

        overflow: hidden;

        background: rgba(0, 0, 0, 0.5);

        border: 1px solid rgba(0, 183, 255, 0.2);

        box-shadow:
          inset 0 0 8px rgba(0, 0, 0, 0.8),
          0 0 8px rgba(0, 183, 255, 0.08);
      }

      .progress-bar {
        width: 0%;

        height: 100%;

        background: linear-gradient(
          90deg,
          var(--primary-color),
          var(--primary-light)
        );

        box-shadow:
          0 0 8px rgba(0, 183, 255, 0.8),
          0 0 18px rgba(0, 183, 255, 0.5);

        transition:
          width 0.5s linear,
          background 0.3s ease,
          box-shadow 0.3s ease;
      }

      /* ================================
     Progress Warning
  ================================= */

      .progress-bar.warning {
        background: linear-gradient(90deg, #ff9d00, var(--warning-color));

        box-shadow:
          0 0 8px rgba(255, 196, 0, 0.8),
          0 0 18px rgba(255, 196, 0, 0.5);
      }

      .progress-bar.danger {
        background: linear-gradient(90deg, #ff1744, var(--danger-color));

        box-shadow:
          0 0 8px rgba(255, 56, 100, 0.8),
          0 0 18px rgba(255, 56, 100, 0.5);
      }

      /* ================================
     Target Time
  ================================= */

      #targetTimeDisplay {
        margin-top: 12px;

        font-size: 12px;

        letter-spacing: 2px;

        color: var(--sub-text-color);
      }

      /* ================================
     Tech Control Buttons
  ================================= */

      .buttons {
        display: flex;

        justify-content: center;

        align-items: center;

        gap: 14px;
      }

      /* ================================
     Common Button
     
     Default:
     統一白藍色主題
  ================================= */

      .control-btn {
        position: relative;

        width: 72px;
        height: 52px;

        display: flex;

        justify-content: center;
        align-items: center;

        padding: 0;

        border: none;

        /* 預設統一白藍色 */
        color: var(--primary-light);

        background: rgba(0, 20, 35, 0.75);

        cursor: pointer;

        overflow: hidden;

        clip-path: polygon(
          8px 0,
          calc(100% - 8px) 0,
          100% 8px,
          100% calc(100% - 8px),
          calc(100% - 8px) 100%,
          8px 100%,
          0 calc(100% - 8px),
          0 8px
        );

        transition:
          transform 0.2s ease,
          background 0.3s ease,
          box-shadow 0.3s ease,
          color 0.3s ease;
      }

      /* ================================
     Tech Border
  ================================= */

      .control-btn::before {
        content: "";

        position: absolute;

        inset: 0;

        padding: 1px;

        background: currentColor;

        opacity: 0.5;

        clip-path: inherit;

        pointer-events: none;
      }

      /* ================================
     Inner Background
  ================================= */

      .control-btn::after {
        content: "";

        position: absolute;

        inset: 2px;

        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.04), transparent 40%),
          rgba(5, 15, 25, 0.95);

        clip-path: inherit;

        z-index: 0;

        transition:
          background 0.3s ease,
          opacity 0.3s ease;
      }

      /* ================================
     Default Hover
  ================================= */

      .control-btn:hover {
        transform: translateY(-2px);
      }

      .control-btn:hover::after {
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.1), transparent 45%),
          rgba(5, 25, 40, 0.95);
      }

      /* ================================
     Active
  ================================= */

      .control-btn:active {
        transform: translateY(0) scale(0.96);
      }

      /* ================================
     Icon
  ================================= */

      .icon {
        position: relative;

        z-index: 2;

        display: block;

        filter: drop-shadow(0 0 5px currentColor);
      }

      /* ================================
     Play Icon
  ================================= */

      .play-icon {
        width: 0;
        height: 0;

        margin-left: 4px;

        border-top: 9px solid transparent;
        border-bottom: 9px solid transparent;
        border-left: 14px solid currentColor;
      }

      /* ================================
     Pause Icon
  ================================= */

      .pause-icon {
        width: 14px;
        height: 18px;

        border-left: 4px solid currentColor;
        border-right: 4px solid currentColor;
      }

      /* ================================
     Reset Icon
  ================================= */

      .reset-icon {
        font-family: Arial, sans-serif;

        font-size: 28px;

        font-weight: 300;

        line-height: 1;

        transform: translateY(-1px);
      }

      /* ==================================================
     START BUTTON
     
     Default:
     白藍色

     Hover:
     綠色
  ================================================== */

      #startBtn:hover {
        color: var(--success-color);

        background: rgba(0, 255, 157, 0.12);

        box-shadow:
          0 0 8px rgba(0, 255, 157, 0.5),
          0 0 20px rgba(0, 255, 157, 0.25),
          inset 0 0 15px rgba(0, 255, 157, 0.08);
      }

      /* ==================================================
     PAUSE BUTTON
     
     Default:
     白藍色

     Hover:
     黃色
  ================================================== */

      #pauseBtn:hover {
        color: var(--warning-color);

        background: rgba(255, 196, 0, 0.12);

        box-shadow:
          0 0 8px rgba(255, 196, 0, 0.5),
          0 0 20px rgba(255, 196, 0, 0.25),
          inset 0 0 15px rgba(255, 196, 0, 0.08);
      }

      /* ==================================================
     RESET BUTTON
     
     Default:
     白藍色

     Hover:
     紅色
  ================================================== */

      #resetBtn:hover {
        color: var(--danger-color);

        background: rgba(255, 56, 100, 0.12);

        box-shadow:
          0 0 8px rgba(255, 56, 100, 0.5),
          0 0 20px rgba(255, 56, 100, 0.25),
          inset 0 0 15px rgba(255, 56, 100, 0.08);
      }

      /* ================================
     Message
  ================================= */

      #message {
        height: 24px;

        margin-top: 25px;

        font-size: 13px;

        letter-spacing: 1px;

        color: var(--sub-text-color);
      }

      /* ================================
     Scan Line
  ================================= */

      .scan-line {
        position: absolute;

        left: 0;
        right: 0;

        height: 1px;

        background: rgba(0, 183, 255, 0.08);

        animation: scan 5s linear infinite;

        pointer-events: none;
      }

      @keyframes scan {
        0% {
          top: 0;
          opacity: 0;
        }

        10% {
          opacity: 1;
        }

        90% {
          opacity: 1;
        }

        100% {
          top: 100%;
          opacity: 0;
        }
      }

      /* ==================================================
     MOBILE
  ================================================== */

      @media (max-width: 600px) {
        .timer-container {
          padding: 30px 20px;
        }

        h1 {
          font-size: 25px;
        }

        .input-group {
          flex-direction: column;
        }

        .buttons {
          flex-wrap: wrap;
        }

        .control-btn {
          width: 52px;
          height: 52px;
        }

        .play-icon {
          border-top-width: 9px;
          border-bottom-width: 9px;
          border-left-width: 14px;
        }

        .pause-icon {
          width: 13px;
          height: 18px;
        }

        .reset-icon {
          font-size: 29px;
        }

        #secondsDisplay {
          font-size: 58px;
          letter-spacing: 4px;
        }
      }

      /* ==================================================
     MINI MODE
     420px 以下
     
     三個按鈕：
     - 長方形
     - 平均寬度
     - 預設白藍色
     - Hover 才變成各自顏色
  ================================================== */

      @media (max-width: 420px) {
        body {
          min-height: 100vh;

          align-items: center;

          background: #050a12;
        }

        .timer-container {
          width: 100%;

          max-width: none;

          padding: 12px;

          border: 1px solid rgba(0, 183, 255, 0.35);

          box-shadow: 0 0 20px rgba(0, 140, 255, 0.15);
        }

        /* 隱藏不需要的元素 */

        .system-label,
        h1,
        .input-group,
        .unit,
        #message,
        #targetTimeDisplay,
        .scan-line {
          display: none;
        }

        /* Timer */

        .timer {
          padding: 12px 5px;

          margin: 0 0 12px;

          border: none;

          background: transparent;
        }

        #secondsDisplay {
          font-size: clamp(42px, 15vw, 70px);

          letter-spacing: 3px;

          white-space: nowrap;

          word-break: normal;
        }

        /* Progress Bar */

        .progress-container {
          height: 5px;

          margin-top: 15px;
        }

        /* ================================
       Buttons
    ================================= */

        .buttons {
          display: flex;

          flex-wrap: nowrap;

          justify-content: stretch;

          gap: 5px;

          width: 100%;
        }

        /* ================================
       Mini Control Buttons
       
       重要：
       這裡直接覆蓋原本的八角形
    ================================= */

        .control-btn {
          flex: 1 1 0;

          width: 0;

          min-width: 0;

          height: 36px;

          padding: 0;

          /* 長方形 */
          clip-path: none;

          /* 白藍色主題 */
          color: var(--primary-light);

          background: rgba(0, 20, 35, 0.75);

          /* 直接使用真正的 border */
          border: 1px solid var(--primary-color);

          border-radius: 0;

          box-shadow:
            0 0 5px rgba(0, 183, 255, 0.08),
            inset 0 0 10px rgba(0, 183, 255, 0.03);
        }

        /* ================================
       Mini Border
       
       關閉原本偽元素
    ================================= */

        .control-btn::before {
          display: none;
        }

        /* ================================
       Mini Inner Background
    ================================= */

        .control-btn::after {
          inset: 0;

          clip-path: none;

          border-radius: 0;

          background:
            linear-gradient(135deg, rgba(255, 255, 255, 0.04), transparent 40%),
            rgba(5, 15, 25, 0.95);
        }

        /* ================================
       Mini Hover
    ================================= */

        #startBtn:hover {
          color: var(--success-color);

          border-color: var(--success-color);

          background: rgba(0, 255, 157, 0.12);

          box-shadow:
            0 0 8px rgba(0, 255, 157, 0.5),
            0 0 20px rgba(0, 255, 157, 0.25),
            inset 0 0 15px rgba(0, 255, 157, 0.08);
        }

        #pauseBtn:hover {
          color: var(--warning-color);

          border-color: var(--warning-color);

          background: rgba(255, 196, 0, 0.12);

          box-shadow:
            0 0 8px rgba(255, 196, 0, 0.5),
            0 0 20px rgba(255, 196, 0, 0.25),
            inset 0 0 15px rgba(255, 196, 0, 0.08);
        }

        #resetBtn:hover {
          color: var(--danger-color);

          border-color: var(--danger-color);

          background: rgba(255, 56, 100, 0.12);

          box-shadow:
            0 0 8px rgba(255, 56, 100, 0.5),
            0 0 20px rgba(255, 56, 100, 0.25),
            inset 0 0 15px rgba(255, 56, 100, 0.08);
        }

        /* ================================
       Mini Play Icon
    ================================= */

        .play-icon {
          margin-left: 2px;

          border-top-width: 6px;
          border-bottom-width: 6px;
          border-left-width: 9px;
        }

        /* ================================
       Mini Pause Icon
    ================================= */

        .pause-icon {
          width: 9px;

          height: 13px;

          border-left-width: 3px;

          border-right-width: 3px;
        }

        /* ================================
       Mini Reset Icon
    ================================= */

        .reset-icon {
          font-size: 20px;
        }
      }

      /* ==================================================
     EXTRA MINI MODE
     320px 以下
     
     同樣保持長方形
  ================================================== */

      @media (max-width: 320px) {
        .timer-container {
          padding: 8px;
        }

        .timer {
          padding: 5px 0;

          margin-bottom: 7px;
        }

        #secondsDisplay {
          font-size: 38px;

          letter-spacing: 1px;
        }

        .progress-container {
          height: 4px;

          margin-top: 10px;
        }

        .buttons {
          gap: 4px;
        }

        /* ================================
       320px 以下長方形按鈕
    ================================= */

        .control-btn {
          flex: 1 1 0;

          width: 0;

          min-width: 0;

          height: 32px;

          clip-path: none;

          border: 1px solid var(--primary-color);

          border-radius: 0;

          color: var(--primary-light);

          background: rgba(0, 20, 35, 0.75);
        }

        .control-btn::before {
          display: none;
        }

        .control-btn::after {
          inset: 0;

          clip-path: none;

          border-radius: 0;
        }

        /* ================================
       320px Hover
    ================================= */

        #startBtn:hover {
          color: var(--success-color);

          border-color: var(--success-color);

          background: rgba(0, 255, 157, 0.12);

          box-shadow:
            0 0 8px rgba(0, 255, 157, 0.5),
            0 0 20px rgba(0, 255, 157, 0.25);
        }

        #pauseBtn:hover {
          color: var(--warning-color);

          border-color: var(--warning-color);

          background: rgba(255, 196, 0, 0.12);

          box-shadow:
            0 0 8px rgba(255, 196, 0, 0.5),
            0 0 20px rgba(255, 196, 0, 0.25);
        }

        #resetBtn:hover {
          color: var(--danger-color);

          border-color: var(--danger-color);

          background: rgba(255, 56, 100, 0.12);

          box-shadow:
            0 0 8px rgba(255, 56, 100, 0.5),
            0 0 20px rgba(255, 56, 100, 0.25);
        }

        .play-icon {
          border-top-width: 5px;

          border-bottom-width: 5px;

          border-left-width: 8px;
        }

        .pause-icon {
          width: 8px;

          height: 11px;

          border-left-width: 2px;

          border-right-width: 2px;
        }

        .reset-icon {
          font-size: 18px;
        }
      }
    </style>
  </head>

  <body>
    <div class="timer-container">
      <div class="scan-line"></div>

      <div class="system-label">SYSTEM // COUNTDOWN</div>

      <h1>Countdown Timer</h1>

      <!-- Target Time Input -->

      <div class="input-group">
        <input
          id="timeInput"
          type="text"
          inputmode="numeric"
          maxlength="4"
          placeholder="HHMM"
          aria-label="Target time"
          autocomplete="off"
        />
      </div>

      <!-- Timer -->

      <div class="timer">
        <div id="secondsDisplay">0</div>

        <div class="unit">SECONDS REMAINING</div>

        <!-- Progress Bar -->

        <div class="progress-container">
          <div id="progressBar" class="progress-bar"></div>
        </div>

        <div id="targetTimeDisplay">TARGET TIME: --</div>
      </div>

      <!-- Buttons -->

      <div class="buttons">
        <button
          id="startBtn"
          class="control-btn"
          onclick="startTimer()"
          aria-label="Start"
          title="Start"
        >
          <span class="icon play-icon"></span>
        </button>

        <button
          id="pauseBtn"
          class="control-btn"
          onclick="pauseTimer()"
          aria-label="Pause"
          title="Pause"
        >
          <span class="icon pause-icon"></span>
        </button>

        <button
          id="resetBtn"
          class="control-btn"
          onclick="resetTimer()"
          aria-label="Reset"
          title="Reset"
        >
          <span class="icon reset-icon">↻</span>
        </button>
      </div>

      <div id="message"></div>
    </div>

    <script>
      /* ================================
     Variables
  ================================= */

      let totalSeconds = 0;

      let remainingSeconds = 0;

      let timer = null;

      let targetTime = null;

      const secondsDisplay = document.getElementById("secondsDisplay");

      const timeInput = document.getElementById("timeInput");

      const message = document.getElementById("message");

      const progressBar = document.getElementById("progressBar");

      const targetTimeDisplay = document.getElementById("targetTimeDisplay");

      /* ================================
     Format Time AM / PM
  ================================= */

      function formatTimeAMPM(timeValue) {
        const hours = Number(timeValue.substring(0, 2));

        const minutes = Number(timeValue.substring(2, 4));

        const period = hours >= 12 ? "PM" : "AM";

        const displayHours = hours % 12 || 12;

        return `${displayHours}:${String(minutes).padStart(2, "0")} ${period}`;
      }

      /* ================================
     Validate Time
  ================================= */

      function isValidTime(timeValue) {
        if (!/^\d{4}$/.test(timeValue)) {
          return false;
        }

        const hours = Number(timeValue.substring(0, 2));

        const minutes = Number(timeValue.substring(2, 4));

        return hours >= 0 && hours <= 23 && minutes >= 0 && minutes <= 59;
      }

      /* ================================
     Get Target Time
  ================================= */

      function getTargetDate(timeValue) {
        const hours = Number(timeValue.substring(0, 2));

        const minutes = Number(timeValue.substring(2, 4));

        const now = new Date();

        const target = new Date();

        target.setHours(hours);

        target.setMinutes(minutes);

        target.setSeconds(0);

        target.setMilliseconds(0);

        /*
      如果輸入的時間已經過了今天，
      就設定為明天同一時間
    */

        if (target <= now) {
          target.setDate(target.getDate() + 1);
        }

        return target;
      }

      /* ================================
     Start Countdown
  ================================= */

      function startTimer() {
        /*
      已經在倒數時，
      不重複啟動
    */

        if (timer !== null) {
          return;
        }

        const timeValue = timeInput.value.trim();

        /*
      如果沒有輸入時間
    */

        if (!timeValue) {
          message.textContent = "PLEASE ENTER TARGET TIME";

          return;
        }

        /*
      驗證時間格式
    */

        if (!isValidTime(timeValue)) {
          message.textContent = "INVALID TIME - USE HHMM";

          return;
        }

        /*
      第一次 START
      或 RESET 後重新開始
    */

        if (!targetTime) {
          targetTime = getTargetDate(timeValue);

          const now = new Date();

          totalSeconds = Math.max(
            0,
            Math.floor((targetTime.getTime() - now.getTime()) / 1000),
          );

          remainingSeconds = totalSeconds;

          targetTimeDisplay.textContent = `TARGET TIME: ${formatTimeAMPM(timeValue)}`;

          updateDisplay();
        }

        /*
      如果時間已經到了
    */

        if (remainingSeconds <= 0) {
          message.textContent = "TIME COMPLETED";

          return;
        }

        message.textContent = "COUNTDOWN ACTIVE";

        /*
      開始倒數
    */

        timer = setInterval(() => {
          const now = new Date();

          /*
        直接計算目前距離目標時間

        避免 setInterval 延遲造成誤差
      */

          remainingSeconds = Math.max(
            0,
            Math.ceil((targetTime.getTime() - now.getTime()) / 1000),
          );

          updateDisplay();

          /*
        倒數結束
      */

          if (remainingSeconds <= 0) {
            clearInterval(timer);

            timer = null;

            remainingSeconds = 0;

            updateDisplay();

            message.textContent = "TIME COMPLETED";

            return;
          }
        }, 1000);
      }

      /* ================================
     Pause
  ================================= */

      function pauseTimer() {
        if (timer !== null) {
          clearInterval(timer);

          timer = null;

          /*
        保留 targetTime

        之後按 START
        可以繼續倒數
      */

          message.textContent = "COUNTDOWN PAUSED";
        }
      }

      /* ================================
     Reset
  ================================= */

      function resetTimer() {
        clearInterval(timer);

        timer = null;

        targetTime = null;

        totalSeconds = 0;

        remainingSeconds = 0;

        /*
      清除進度條狀態
    */

        progressBar.classList.remove("warning", "danger");

        progressBar.style.width = "0%";

        /*
      重設顯示
    */

        secondsDisplay.textContent = "0";

        targetTimeDisplay.textContent = "TARGET TIME: --";

        message.textContent = "SYSTEM RESET";
      }

      /* ================================
     Update Display
  ================================= */

      function updateDisplay() {
        /*
      更新秒數
    */

        secondsDisplay.textContent = remainingSeconds;

        /*
      計算進度百分比
    */

        let progress = 0;

        if (totalSeconds > 0) {
          progress = (remainingSeconds / totalSeconds) * 100;
        }

        /*
      限制在 0 ~ 100%
    */

        progress = Math.max(0, Math.min(100, progress));

        /*
      先移除舊狀態
    */

        progressBar.classList.remove("warning", "danger");

        /*
      10% 以下 → 紅色
    */

        if (progress <= 10) {
          progressBar.classList.add("danger");
        } else if (progress <= 30) {
          /*
        30% 以下 → 黃色
      */

          progressBar.classList.add("warning");
        }

        /*
      更新進度寬度
    */

        progressBar.style.width = `${progress}%`;
      }

      /* ================================
     Time Input
  ================================= */

      timeInput.addEventListener("input", function () {
        /*
      只保留數字
    */

        this.value = this.value.replace(/\D/g, "");

        /*
      限制最多 4 位
    */

        this.value = this.value.substring(0, 4);

        /*
      輸入完整 4 位數字後，
      顯示時間
    */

        if (this.value.length === 4) {
          if (isValidTime(this.value)) {
            /*
          如果目前正在倒數，
          先停止
        */

            clearInterval(timer);

            timer = null;

            targetTime = null;

            totalSeconds = 0;

            remainingSeconds = 0;

            progressBar.classList.remove("warning", "danger");

            progressBar.style.width = "0%";

            secondsDisplay.textContent = "0";

            /*
          顯示 AM / PM
        */

            targetTimeDisplay.textContent = `TARGET TIME: ${formatTimeAMPM(this.value)}`;

            message.textContent = "TARGET TIME SET";
          } else {
            targetTimeDisplay.textContent = "TARGET TIME: --";

            message.textContent = "INVALID TIME - USE HHMM";
          }
        } else {
          /*
        尚未輸入完整時間
      */

          targetTimeDisplay.textContent = "TARGET TIME: --";

          message.textContent = "";
        }
      });
    </script>
  </body>
</html>
